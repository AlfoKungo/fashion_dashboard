services:
  mongo:
    image: mongo:7
    container_name: fashion-dashboard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: fashion
      MONGO_INITDB_ROOT_PASSWORD: dashboard
      MONGO_INITDB_DATABASE: fashion_dashboard
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
