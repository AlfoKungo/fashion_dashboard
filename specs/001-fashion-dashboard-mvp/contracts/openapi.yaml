openapi: 3.1.0
info:
  title: Personal Men's Fashion Dashboard API
  version: 0.1.0
  description: JSON and image contracts for the MVP dashboard.
servers:
  - url: http://localhost:8080
paths:
  /api/articles:
    get:
      summary: List article cards
      parameters:
        - $ref: '#/components/parameters/Amount'
      responses:
        '200':
          description: Article records for display
          content:
            application/json:
              schema:
                type: object
                required: [articles]
                properties:
                  articles:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/InvalidAmount'
  /api/looks:
    get:
      summary: List look cards
      parameters:
        - $ref: '#/components/parameters/Amount'
      responses:
        '200':
          description: Look records for display
          content:
            application/json:
              schema:
                type: object
                required: [looks]
                properties:
                  looks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Look'
        '400':
          $ref: '#/components/responses/InvalidAmount'
  /api/items:
    get:
      summary: List item cards
      parameters:
        - $ref: '#/components/parameters/Amount'
      responses:
        '200':
          description: Item records for display
          content:
            application/json:
              schema:
                type: object
                required: [category, items]
                properties:
                  category:
                    type: string
                    description: Active daily item focus category.
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/InvalidAmount'
  /images/articles/{id}:
    get:
      summary: Serve or redirect an article image
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Stored image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to original image URL when stored bytes are unavailable
        '404':
          $ref: '#/components/responses/NotFound'
  /images/looks/{id}:
    get:
      summary: Serve or redirect a look image
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Stored image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to original image URL when stored bytes are unavailable
        '404':
          $ref: '#/components/responses/NotFound'
  /images/items/{id}:
    get:
      summary: Serve or redirect an item image
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Stored image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to original image URL when stored bytes are unavailable
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    Amount:
      name: amount
      in: query
      required: false
      description: "Number of records to return. Defaults depend on endpoint: 4 for articles and looks, 6 for items. Valid range is 1 through 50."
      schema:
        type: integer
        minimum: 1
        maximum: 50
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    InvalidAmount:
      description: Invalid amount query parameter
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Record or image not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Article:
      type: object
      required: [id, source, title, url, image_src, summary, read_time, tags]
      properties:
        id:
          type: string
        source:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        image_src:
          type: string
          description: Dashboard image route for this article.
        author:
          type: string
        published_at:
          type: string
          format: date-time
        summary:
          type: string
        read_time:
          type: string
        tags:
          type: array
          items:
            type: string
    Look:
      type: object
      required: [id, source, title, image_src, source_url, tags]
      properties:
        id:
          type: string
        source:
          type: string
        title:
          type: string
        image_src:
          type: string
          description: Dashboard image route for this look.
        source_url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
        season:
          type: string
    Item:
      type: object
      required: [id, source, brand, name, category, price, image_src, product_url, tags]
      properties:
        id:
          type: string
        source:
          type: string
        brand:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: string
        currency:
          type: string
        image_src:
          type: string
          description: Dashboard image route for this item.
        product_url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
